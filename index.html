<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#07070e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Activity Tracker">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>Activity Tracker</title>
<style>
:root{
  --bg:#07070e; --card:#0f0f1c; --border:#1c1c2e; --text:#dde1f0; --muted:#52527a; --dim:#1a1a2c;
  --accent:#7c7dff; --green:#22c55e; --greenBg:#060e0a; --greenBd:#0a2a16;
  --red:#f87171; --redBg:#0f0606; --redBd:#2a0a0a;
  --green-1:#22c55e; --green-2:#16a34a; --green-3:#15803d; --green-4:#166534; --green-5:#14532d;
  --red-1:#ef4444;   --red-2:#dc2626;   --red-3:#b91c1c;   --red-4:#991b1b;   --red-5:#7f1d1d;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;}
body{min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
input{-webkit-appearance:none;background:transparent;border:none;outline:none;color:var(--text);font-family:inherit;}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
::-webkit-scrollbar{display:none;}
button{cursor:pointer;font-family:inherit;}
.mono{font-family:"SF Mono",ui-monospace,"Courier New",monospace;}

.screen{min-height:100vh;display:flex;flex-direction:column;}
.header{padding:56px 20px 16px;}
.eyebrow{font-size:11px;letter-spacing:0.14em;color:var(--accent);font-weight:600;text-transform:uppercase;margin-bottom:6px;}
.title{font-size:26px;font-weight:800;letter-spacing:-0.03em;}
.subtitle{color:var(--muted);font-size:13px;margin-top:6px;line-height:1.6;}

.setup-rows{flex:1;padding:20px;display:flex;flex-direction:column;gap:10px;}
.setup-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:0 16px;height:60px;display:flex;align-items:center;gap:12px;}
.row-input-name{flex:1;font-size:15px;}
.row-divider{width:1px;height:22px;background:var(--border);}
.row-input-val{width:72px;color:var(--accent);font-size:16px;font-weight:700;text-align:right;}
.row-del{background:none;border:none;color:var(--muted);font-size:22px;line-height:1;padding:0 0 0 4px;}
.add-row-btn{background:transparent;border:1px dashed var(--dim);border-radius:14px;height:52px;color:var(--muted);font-size:14px;}
.setup-footer{padding:16px 20px 44px;}
.save-btn{width:100%;height:56px;border-radius:14px;border:none;font-size:15px;font-weight:600;}
.save-btn.enabled{background:var(--accent);color:#fff;}
.save-btn.disabled{background:var(--dim);color:var(--muted);}

.dash-header{padding:52px 20px 16px;display:flex;align-items:flex-end;justify-content:space-between;}
.settings-btn{background:none;border:none;color:var(--muted);font-size:22px;padding:4px;}
.cards{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 16px 16px 20px;position:relative;overflow:hidden;display:flex;align-items:center;gap:14px;}
.card-progress{position:absolute;bottom:0;left:0;height:2px;background:var(--green);}
.card-info{flex:1;}
.card-name{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;}
.card-value{font-size:42px;font-weight:800;line-height:1;letter-spacing:-0.04em;}
.card-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.card-buttons{display:flex;flex-direction:column;gap:8px;}
.card-net{font-size:18px;font-weight:700;font-style:italic;opacity:0.6;text-align:right;line-height:1;min-width:36px;align-self:center;}
.btn-circle{width:54px;height:54px;border-radius:14px;font-size:26px;font-weight:300;display:flex;align-items:center;justify-content:center;border:1px solid;line-height:1;}
.btn-minus{color:var(--green);background:var(--greenBg);border-color:var(--greenBd);}
.btn-plus{color:var(--red);background:var(--redBg);border-color:var(--redBd);}
.btn-minus:active{background:var(--green);}
.btn-plus:active{background:var(--red);}

.year-section{padding:24px 20px 8px;}
.year-buttons{display:flex;gap:10px;overflow-x:auto;}
.year-btn{flex-shrink:0;min-width:96px;height:48px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:15px;font-weight:600;font-family:"SF Mono",ui-monospace,monospace;}
.year-btn.active{border-color:var(--accent);color:var(--accent);}

.heatmap-back{background:none;border:none;color:var(--accent);font-size:14px;padding:0 0 14px 0;display:flex;align-items:center;gap:4px;}
.heatmap-title{font-size:22px;font-weight:700;letter-spacing:-0.02em;}
.heatmap-sub{color:var(--muted);font-size:13px;margin-top:4px;}
.heatmap-sub .val{font-weight:700;}

.pills{display:flex;gap:8px;padding:0 20px 16px;overflow-x:auto;}
.pill{border-radius:20px;padding:7px 16px;font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0;border:1px solid;}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.pill.inactive{background:var(--card);border-color:var(--border);color:var(--muted);}

.grid-scroll{padding:0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.grid-wrap{display:inline-flex;flex-direction:column;}
.month-row{display:flex;position:relative;height:14px;margin-bottom:4px;margin-left:22px;}
.month-label{position:absolute;font-size:10px;color:var(--muted);white-space:nowrap;}
.grid-body{display:flex;}
.day-labels{display:flex;flex-direction:column;gap:2px;margin-right:6px;flex-shrink:0;}
.day-label{width:13px;height:13px;font-size:9px;color:var(--muted);display:flex;align-items:center;justify-content:center;line-height:1;}
.grid-cols{display:inline-flex;gap:2px;}
.grid-col{display:flex;flex-direction:column;gap:2px;}
.grid-cell{width:13px;height:13px;border-radius:2px;flex-shrink:0;}

.legend{padding:16px 20px 32px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.legend-label{font-size:11px;color:var(--muted);}
.legend-group{display:flex;gap:3px;align-items:center;}
.legend-swatch{width:12px;height:12px;border-radius:2px;}

.stats-section{padding:20px 20px 8px;}
.stats-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-bottom:6px;}
.stat-value{font-size:20px;font-weight:800;letter-spacing:-0.02em;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.stat-breakdown{font-size:11px;color:var(--muted);margin-top:4px;font-family:"SF Mono",ui-monospace,monospace;}
.stat-breakdown .neg{color:var(--green);}
.stat-breakdown .pos{color:var(--red);}

.compare-section{padding:0 20px 32px;}
.compare-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:12px;}
.compare-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.compare-name{font-size:13px;width:78px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
.compare-name.dim{color:var(--muted);}
.compare-track{flex:1;height:8px;border-radius:4px;background:var(--dim);overflow:hidden;}
.compare-fill{height:100%;border-radius:4px;background:var(--accent);}
.compare-fill.self{background:#4ade80;}
.compare-pct{font-size:12px;font-weight:700;width:38px;text-align:right;flex-shrink:0;font-family:"SF Mono",ui-monospace,monospace;}

.radar-section{padding:0 20px 32px;display:flex;flex-direction:column;gap:18px;}
.radar-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 12px;}
.radar-title{font-size:12px;font-weight:600;color:var(--text);padding:0 8px 8px;}
.radar-svg-wrap{display:flex;justify-content:center;}

.confirm-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px;padding-top:56px;text-align:center;}
.confirm-title{font-size:22px;font-weight:800;letter-spacing:-0.02em;margin-bottom:10px;text-align:center;}
.confirm-body{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:32px;max-width:280px;text-align:center;}
.confirm-actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;text-align:center;margin:0 auto;}
.confirm-btn{width:100%;height:52px;border-radius:14px;font-size:15px;font-weight:600;border:1px solid var(--border);}
.confirm-btn.danger{background:var(--redBg);border-color:var(--redBd);color:var(--red);}
.confirm-btn.safe{background:var(--card);color:var(--text);}

.dm-section{width:100%;max-width:340px;margin-bottom:36px;text-align:center;display:flex;flex-direction:column;align-items:center;}
.dm-heading{font-size:11px;letter-spacing:0.14em;color:var(--accent);font-weight:600;text-transform:uppercase;margin-bottom:14px;text-align:center;}
.dm-block{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;text-align:center;width:100%;}
.dm-block-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;text-align:center;}
.dm-btn{width:100%;height:44px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--dim);color:var(--text);margin-bottom:8px;}
.dm-btn:last-child{margin-bottom:0;}
.dm-btn.accent{background:var(--accent);border-color:var(--accent);color:#fff;}
.dm-btn:disabled{opacity:0.35;cursor:default;}
.dm-textarea{width:100%;min-height:64px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--accent);font-family:"SF Mono",ui-monospace,"Courier New",monospace;font-size:11px;padding:8px 10px;resize:none;outline:none;margin-bottom:8px;line-height:1.5;word-break:break-all;text-align:left;}
.dm-input{width:100%;height:40px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:0 10px;outline:none;margin-bottom:8px;text-align:left;}
.dm-input::placeholder{color:var(--muted);}
.dm-divider{height:1px;background:var(--border);margin:16px 0;}
.danger-label{font-size:11px;letter-spacing:0.14em;color:var(--red);font-weight:600;text-transform:uppercase;margin-bottom:14px;text-align:center;width:100%;}

/* ── Edit Activity screen ── */
.edit-screen{min-height:100vh;display:flex;flex-direction:column;padding:0;}
.edit-header{padding:52px 20px 16px;border-bottom:1px solid var(--border);}
.edit-back{background:none;border:none;color:var(--accent);font-size:14px;padding:0 0 14px 0;display:flex;align-items:center;gap:4px;}
.edit-title{font-size:22px;font-weight:700;letter-spacing:-0.02em;}
.edit-body{flex:1;padding:24px 20px;display:flex;flex-direction:column;gap:24px;}
.edit-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
.edit-section-title{font-size:11px;letter-spacing:0.14em;color:var(--accent);font-weight:600;text-transform:uppercase;margin-bottom:14px;}
.edit-field-label{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em;}
.edit-input{width:100%;height:44px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;padding:0 12px;outline:none;margin-bottom:12px;}
.edit-input:focus{border-color:var(--accent);}
.edit-input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.6);}
.edit-input::placeholder{color:var(--muted);}
.edit-btn{width:100%;height:48px;border-radius:12px;font-size:14px;font-weight:600;border:none;background:var(--accent);color:#fff;cursor:pointer;}
.edit-btn.safe{background:var(--dim);border:1px solid var(--border);color:var(--text);}
.heatmap-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.edit-activity-btn{background:none;border:1px solid var(--border);border-radius:10px;color:var(--accent);font-size:12px;font-weight:600;padding:6px 12px;white-space:nowrap;cursor:pointer;margin-top:2px;flex-shrink:0;}
.edit-activity-btn:active{background:var(--dim);}
</style>
</head>
<body>
<div id="app"></div>
<script>
const STORAGE_KEY = 'activityTrackerData';

function loadData(){
  try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; }
  catch(e){ return []; }
}
function saveData(data){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }catch(e){}
}

function uid(){ return Math.random().toString(36).slice(2,9); }
function pad(n){ return String(n).padStart(2,'0'); }
function ld(d=new Date()){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function todayStr(){ return ld(); }
function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function numColor(cur,init){
  if(cur<=0) return '#4ade80';
  if(cur>init) return 'var(--red)';
  const r = cur/init;
  if(r<0.25) return 'var(--green)';
  if(r<0.5) return '#86efac';
  return 'var(--text)';
}

const heatG=['var(--green-1)','var(--green-2)','var(--green-3)','var(--green-4)','var(--green-5)'];
const heatR=['var(--red-1)','var(--red-2)','var(--red-3)','var(--red-4)','var(--red-5)'];
const heatE='#0f0f1c';

function cellColor(delta){
  if(!delta) return heatE;
  if(delta<0) return heatG[Math.min(Math.abs(delta),5)-1];
  return heatR[Math.min(delta,5)-1];
}

function dayNet(history){
  const m={};
  for(const h of history) m[h.date]=(m[h.date]||0)+h.delta;
  return m;
}

function buildYearGrid(year){
  const today=new Date(); today.setHours(0,0,0,0);
  const todayIso=ld(today);
  const yearStart = new Date(year,0,1);
  const yearEnd   = new Date(year,11,31);
  const yearEndIso = ld(yearEnd);

  const start = new Date(yearStart);
  start.setDate(start.getDate()-((start.getDay()+6)%7));

  const weeks=[]; const cur=new Date(start);
  while(true){
    const week=[];
    for(let i=0;i<7;i++){
      const iso=ld(cur);
      // Include the date if it falls within the year; future dates are included
      // as valid ISO strings so the grid is complete — cellColor will show heatE
      // for them (delta===null/0), and the outline logic skips non-today cells.
      week.push((iso>=ld(yearStart) && iso<=yearEndIso) ? iso : null);
      cur.setDate(cur.getDate()+1);
    }
    weeks.push(week);
    if(ld(cur)>yearEndIso) break;
  }
  return weeks;
}

let state = { screen:'loading', acts:[], mapId:null, year:new Date().getFullYear() };

function init(){
  const data = loadData();
  state.acts = data;
  state.screen = data.length ? 'dashboard' : 'setup';
  document.getElementById('app').addEventListener('click', handleClick);
  render();
}

function render(){
  const app = document.getElementById('app');
  if(state.screen==='setup'){
    app.innerHTML = renderSetup();
    mountSetup();
  } else if(state.screen==='heatmap'){
    app.innerHTML = renderHeatmap();
  } else if(state.screen==='edit-activity'){
    app.innerHTML = renderEditActivity();
  } else if(state.screen==='confirm-reset'){
    app.innerHTML = renderConfirmReset();
  } else {
    app.innerHTML = renderDashboard();
  }
}

function handleClick(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  const id = el.dataset.id;

  if(action==='dec' || action==='inc'){
    updateActivity(id, action==='dec' ? -1 : 1);
  } else if(action==='map'){
    state.mapId = id; state.year = new Date().getFullYear(); state.screen='heatmap'; render();
  } else if(action==='back'){
    state.screen='dashboard'; render();
  } else if(action==='select'){
    state.mapId = id; render();
  } else if(action==='select-year'){
    state.year = +el.dataset.year; render();
  } else if(action==='settings'){
    state.screen='confirm-reset';
    render();
  } else if(action==='confirm-yes'){
    state.acts=[]; saveData([]); state.screen='setup'; render();
  } else if(action==='confirm-no'){
    state.screen='dashboard'; render();
  } else if(action==='export-generate'){
    generateExportCode().then(code=>{
      const ta = document.getElementById('export-out');
      const btn = document.getElementById('copy-btn');
      if(ta){ ta.value = code; }
      if(btn){ btn.disabled = false; }
    }).catch(err=>{
      alert('Export failed: ' + err.message);
    });
  } else if(action==='export-copy'){
    const ta = document.getElementById('export-out');
    if(!ta || !ta.value) return;
    navigator.clipboard.writeText(ta.value).then(()=>{
      el.textContent = '✅ Copied!';
      el.disabled = true;
      setTimeout(()=>{ el.textContent = '📋 Copy Code'; el.disabled = false; }, 2000);
    }).catch(()=>{
      // Fallback for environments without clipboard API
      ta.select();
      document.execCommand('copy');
      el.textContent = '✅ Copied!';
      el.disabled = true;
      setTimeout(()=>{ el.textContent = '📋 Copy Code'; el.disabled = false; }, 2000);
    });
  } else if(action==='import-restore'){
    const inp = document.getElementById('import-in');
    const code = inp ? inp.value.trim() : '';
    if(!code){
      alert('Please paste a valid export code first.');
      return;
    }
    restoreFromCode(code).then(parsed=>{
      if(!Array.isArray(parsed)){
        alert('Invalid export code: the data does not contain a valid activity list.');
        return;
      }
      saveData(parsed);
      state.acts = parsed;
      state.screen = 'dashboard';
      render();
    }).catch(()=>{
      alert('Invalid export code: the text appears to be corrupted or incomplete. Please make sure you pasted the full code.');
    });
  } else if(action==='edit-page'){
    state.screen='edit-activity'; render();
  } else if(action==='back-to-heatmap'){
    state.screen='heatmap'; render();
  } else if(action==='edit-save-goal'){
    const inp = document.getElementById('edit-goal-input');
    const val = inp ? parseInt(inp.value, 10) : NaN;
    if(isNaN(val) || val <= 0){
      alert('Please enter a valid positive number for the goal.');
      return;
    }
    state.acts = state.acts.map(a=>{
      if(a.id !== state.mapId) return a;
      const diff = val - a.initialValue;
      const newCurrent = a.currentValue + diff;
      return {...a, initialValue: val, currentValue: newCurrent};
    });
    saveData(state.acts);
    render();
    alert('✅ Goal updated!');
  } else if(action==='edit-update-day'){
    const dateInp = document.getElementById('edit-day-date');
    const valInp  = document.getElementById('edit-day-value');
    const chosenDate = dateInp ? dateInp.value : '';
    const newDelta   = valInp  ? parseInt(valInp.value, 10) : NaN;
    if(!chosenDate){
      alert('Please pick a date.');
      return;
    }
    if(isNaN(newDelta)){
      alert('Please enter a numeric value (can be negative).');
      return;
    }
    state.acts = state.acts.map(a=>{
      if(a.id !== state.mapId) return a;
      let history = [...a.history];
      const idx = history.findIndex(h => h.date === chosenDate);
      if(idx !== -1){
        if(newDelta === 0){
          history.splice(idx, 1);
        } else {
          history[idx] = {...history[idx], delta: newDelta};
        }
      } else {
        if(newDelta !== 0){
          history.push({date: chosenDate, delta: newDelta, valueAfter: 0});
        }
      }
      // Recalculate currentValue from initialValue + sum of all deltas
      const totalDelta = history.reduce((s, h) => s + h.delta, 0);
      const newCurrent = a.initialValue + totalDelta;
      // Recalculate valueAfter for each entry in chronological order
      const sorted = [...history].sort((x,y)=> x.date < y.date ? -1 : x.date > y.date ? 1 : 0);
      let running = a.initialValue;
      const recalculated = sorted.map(h => {
        running += h.delta;
        return {...h, valueAfter: running};
      });
      return {...a, history: recalculated, currentValue: newCurrent};
    });
    saveData(state.acts);
    if(dateInp) dateInp.value = '';
    if(valInp)  valInp.value = '';
    render();
    alert(`✅ Entry for ${chosenDate} updated!`);
  }
}

function updateActivity(id, delta){
  const today = todayStr();
  state.acts = state.acts.map(a=>{
    if(a.id!==id) return a;
    const val = a.currentValue + delta;
    const existing = a.history.find(h=>h.date===today);
    let newHistory;
    if(existing){
      newHistory = a.history.map(h=>{
        if(h.date!==today) return h;
        return {...h, delta:h.delta+delta, valueAfter:h.valueAfter+delta};
      });
    } else {
      newHistory = [...a.history, {date:today, delta, valueAfter:val}];
    }
    return {...a, currentValue:val, history:newHistory};
  });
  saveData(state.acts);
  render();
}

function renderDashboard(){
  const today = new Date();
  const label = today.toLocaleDateString('en',{weekday:'long',month:'long',day:'numeric'});

function getActStats(act){
  const pct = Math.max(0, Math.min(1, 1 - act.currentValue/act.initialValue)) * 100;
  if(act.history.length===0){
    return {pct, netChange:0, dailyRate:0, daysElapsed:0, daysToZero:null};
  }
  const dates = act.history.map(h=>h.date).sort();
  const first = new Date(dates[0]);
  const last = new Date(todayStr());
  const daysElapsed = Math.max(1, Math.round((last-first)/86400000) + 1);
  const netChange = act.history.reduce((s,h)=>s+h.delta,0);
  const dailyRate = netChange/daysElapsed;
  let daysToZero = null;
  if(dailyRate < 0){
    daysToZero = Math.ceil(act.currentValue / -dailyRate);
  }
  return {pct, netChange, dailyRate, daysElapsed, daysToZero};
}

function getYearHistory(act, year){
  return act.history.filter(h=>new Date(h.date).getFullYear()===year);
}

function getActStatsForYear(act, year){
  const pct = Math.max(0, Math.min(1, 1 - act.currentValue/act.initialValue)) * 100;
  const yearHistory = getYearHistory(act, year);
  const today = new Date(); today.setHours(0,0,0,0);
  const currentYear = today.getFullYear();

  if(yearHistory.length===0){
    return {pct, netChange:0, dailyRate:0, daysElapsed:0, daysToZero:null, valueAtEnd:null, posCount:0, negCount:0};
  }

  const dates = yearHistory.map(h=>h.date).sort();
  const first = new Date(dates[0]);
  const periodEnd = year===currentYear ? today : new Date(year,11,31);
  const daysElapsed = Math.max(1, Math.round((periodEnd-first)/86400000) + 1);
  const netChange = yearHistory.reduce((s,h)=>s+h.delta,0);
  const dailyRate = netChange/daysElapsed;
  const negCount = yearHistory.filter(h=>h.delta<0).reduce((s,h)=>s-h.delta,0);
  const posCount = yearHistory.filter(h=>h.delta>0).reduce((s,h)=>s+h.delta,0);

  const projectFrom = year===currentYear ? act.currentValue : lastValueAfter(yearHistory);
  let daysToZero = null;
  if(dailyRate < 0){
    daysToZero = Math.ceil(projectFrom / -dailyRate);
  }
  return {pct, netChange, dailyRate, daysElapsed, daysToZero, valueAtEnd: projectFrom, posCount, negCount};
}

function getMonthlyTotals(act, year){
  const neg = new Array(12).fill(0);
  const pos = new Array(12).fill(0);
  getYearHistory(act, year).forEach(h=>{
    const m = new Date(h.date).getMonth();
    if(h.delta<0) neg[m] += -h.delta;
    else if(h.delta>0) pos[m] += h.delta;
  });
  return {neg, pos};
}

function getWeekdayAverages(act, year){
  const negSum = new Array(7).fill(0);
  const posSum = new Array(7).fill(0);
  const weekCount = new Array(7).fill(0);
  const grid = buildYearGrid(year);
  grid.forEach(week=>{
    week.forEach((date,di)=>{ if(date) weekCount[di]++; });
  });
  getYearHistory(act, year).forEach(h=>{
    let jsDay = new Date(h.date).getDay();
    const di = (jsDay+6)%7;
    if(h.delta<0) negSum[di] += -h.delta;
    else if(h.delta>0) posSum[di] += h.delta;
  });
  const negAvg = negSum.map((v,i)=>weekCount[i]?v/weekCount[i]:0);
  const posAvg = posSum.map((v,i)=>weekCount[i]?v/weekCount[i]:0);
  return {negAvg, posAvg};
}

function buildRadarSVG(values, labels, color, fixedMax, ringValues){
  const size = 280, cx = size/2, cy = size/2, r = 100;
  const n = values.length;

  // All charts auto-scale: outer ring = max value in dataset.
  const maxVal = Math.max(1, ...values);
  const rings = ringValues || [0.25, 0.5, 0.75, 1].map(f => Math.round(f * maxVal));
  const pointAt = (i, val) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const dist = Math.min(val / maxVal, 1) * r;
    return [cx + dist * Math.cos(angle), cy + dist * Math.sin(angle)];
  };

  const ringsHtml = rings.map(ringVal => {
    const frac = ringVal / maxVal;
    const pts = Array.from({length: n}, (_, i) => {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const dist = frac * r;
      return `${cx + dist * Math.cos(angle)},${cy + dist * Math.sin(angle)}`;
    }).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="#1c1c2e" stroke-width="1"/>`;
  }).join('');

  const spokesHtml = Array.from({length: n}, (_, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x2 = cx + r * Math.cos(angle), y2 = cy + r * Math.sin(angle);
    return `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#1c1c2e" stroke-width="1"/>`;
  }).join('');

  const dataPts = values.map((v, i) => pointAt(i, v));
  const dataPolygon = dataPts.map(p => p.join(',')).join(' ');
  const dotsHtml = dataPts.map(p =>
    `<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="${color}"/>`
  ).join('');

  const labelsHtml = labels.map((lab, i) => {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const lx = cx + (r + 22) * Math.cos(angle), ly = cy + (r + 22) * Math.sin(angle);
    return `<text x="${lx}" y="${ly}" fill="#52527a" font-size="10" font-family="-apple-system,sans-serif" text-anchor="middle" dominant-baseline="middle">${lab}</text>`;
  }).join('');

  // Ring value labels: show each ring's value near the top spoke
  const ringLabelsHtml = rings.map(ringVal => {
    const frac = ringVal / maxVal;
    const dist = frac * r;
    // Place label just to the right of the top-spoke tip for each ring
    const lx = cx + 4;
    const ly = cy - dist - 4;
    return `<text x="${lx}" y="${ly}" fill="#3a3a5a" font-size="9" font-family="-apple-system,sans-serif">${ringVal}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
    ${ringsHtml}${spokesHtml}
    <polygon points="${dataPolygon}" fill="${color}22" stroke="${color}" stroke-width="2"/>
    ${dotsHtml}
    ${labelsHtml}
    ${ringLabelsHtml}
  </svg>`;
}

function lastValueAfter(yearHistory){
  const sorted = [...yearHistory].sort((a,b)=>a.date<b.date?-1:1);
  return sorted[sorted.length-1].valueAfter;
}

function formatDuration(days){
  if(days===null) return '—';
  if(days < 1) return 'Today';
  if(days < 60) return `${days} day${days===1?'':'s'}`;
  if(days < 730) return `${Math.round(days/30.44)} months`;
  return `${(days/365.25).toFixed(1)} years`;
}

function getAvailableYears(acts){
  const currentYear = new Date().getFullYear();
  const years = new Set([currentYear]);
  acts.forEach(a=>a.history.forEach(h=>years.add(new Date(h.date).getFullYear())));
  return [...years].sort((a,b)=>b-a);
}

function getMonthLabelsForGrid(grid){
  const labels = []; const seen = new Set();
  grid.forEach((week,i)=>{
    const d = week.find(Boolean); if(!d) return;
    const dt = new Date(d); const key = `${dt.getFullYear()}-${dt.getMonth()}`;
    if(!seen.has(key)){ seen.add(key); labels.push({i, label:dt.toLocaleString('en',{month:'short'})}); }
  });
  return labels;
}

function buildSetupRow(id){
  const row = document.createElement('div');
  row.className='setup-row';
  row.dataset.id=id;
  row.innerHTML = `
    <input class="row-input-name" placeholder="Activity name" type="text">
    <div class="row-divider"></div>
    <input class="row-input-val mono" placeholder="2200" inputmode="numeric" type="text">
    <button class="row-del" aria-label="Remove">&times;</button>
  `;
  return row;
}

function mountSetup(){
  const container = document.getElementById('setup-rows');

  const addBtn = document.createElement('button');
  addBtn.className='add-row-btn';
  addBtn.id='add-row-btn';
  addBtn.textContent='+ Add activity';
  addBtn.addEventListener('click', ()=>{
    if(container.querySelectorAll('.setup-row').length < 6){
      container.insertBefore(buildSetupRow(uid()), addBtn);
      updateSetupUI();
    }
  });

  for(let i=0;i<3;i++) container.appendChild(buildSetupRow(uid()));
  container.appendChild(addBtn);

  container.addEventListener('input', updateSetupUI);
  container.addEventListener('click', e=>{
    if(e.target.classList.contains('row-del')){
      const rows = container.querySelectorAll('.setup-row');
      if(rows.length>1){
        e.target.closest('.setup-row').remove();
        updateSetupUI();
      }
    }
  });

  document.getElementById('save-btn').addEventListener('click', saveSetup);
  updateSetupUI();
}

function updateSetupUI(){
  const container = document.getElementById('setup-rows');
  const rows = container.querySelectorAll('.setup-row');
  rows.forEach(row=>{
    row.querySelector('.row-del').style.visibility = rows.length>1 ? 'visible' : 'hidden';
  });
  document.getElementById('add-row-btn').style.display = rows.length>=6 ? 'none' : 'block';

  let canSave=false;
  rows.forEach(row=>{
    const name = row.querySelector('.row-input-name').value.trim();
    const val = +row.querySelector('.row-input-val').value;
    if(name && val>0) canSave=true;
  });
  document.getElementById('save-btn').className = 'save-btn ' + (canSave?'enabled':'disabled');
}

function saveSetup(){
  const container = document.getElementById('setup-rows');
  const rows = container.querySelectorAll('.setup-row');
  const acts=[];
  rows.forEach(row=>{
    const name = row.querySelector('.row-input-name').value.trim();
    const val = +row.querySelector('.row-input-val').value;
    if(name && val>0){
      acts.push({id:row.dataset.id, name, initialValue:val, currentValue:val, history:[]});
    }
  });
  if(acts.length){
    state.acts = acts;
    saveData(acts);
    state.screen='dashboard';
    render();
  }
}

/* ── Export: JSON → deflate → Base64 ── */
async function generateExportCode(){
  const raw = localStorage.getItem(STORAGE_KEY) || '[]';
  const encoder = new TextEncoder();
  const inputBytes = encoder.encode(raw);

  const cs = new CompressionStream('deflate');
  const writer = cs.writable.getWriter();
  writer.write(inputBytes);
  writer.close();

  const chunks = [];
  const reader = cs.readable.getReader();
  while(true){
    const {done, value} = await reader.read();
    if(done) break;
    chunks.push(value);
  }

  const totalLen = chunks.reduce((n,c)=>n+c.length, 0);
  const merged = new Uint8Array(totalLen);
  let offset = 0;
  for(const chunk of chunks){ merged.set(chunk, offset); offset += chunk.length; }

  // Uint8Array → binary string → base64
  let binary = '';
  for(let i=0; i<merged.length; i++) binary += String.fromCharCode(merged[i]);
  return btoa(binary);
}

/* ── Import: Base64 → inflate → JSON ── */
async function restoreFromCode(code){
  const binary = atob(code.trim());
  const bytes = new Uint8Array(binary.length);
  for(let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);

  const ds = new DecompressionStream('deflate');
  const writer = ds.writable.getWriter();
  writer.write(bytes);
  writer.close();

  const chunks = [];
  const reader = ds.readable.getReader();
  while(true){
    const {done, value} = await reader.read();
    if(done) break;
    chunks.push(value);
  }

  const totalLen = chunks.reduce((n,c)=>n+c.length, 0);
  const merged = new Uint8Array(totalLen);
  let offset = 0;
  for(const chunk of chunks){ merged.set(chunk, offset); offset += chunk.length; }

  const json = new TextDecoder().decode(merged);
  return JSON.parse(json);
}
